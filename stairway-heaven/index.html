<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>천국의 계단</title>
  <link rel="stylesheet" href="style.css">
  <!-- SheetJS: 엑셀(.xlsx) 파싱 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- 개발용 디버그 패널 -->
  <button id="debugToggle" title="디버그 패널 토글 (` 키)">DEV</button>
  <div id="debugPanel" class="hidden">
    <div class="debugTitle">디버그 — 아이템 즉시 발동</div>
    <div class="debugGroup">
      <div class="debugLabel">고급 아이템</div>
      <button onclick="useItem('낙하산')">낙하산 x1</button>
      <button onclick="useItem('낙하산2개')">낙하산 x2</button>
      <button onclick="useItem('낙하산3개')">낙하산 x3</button>
      <button onclick="useItem('진정제')">진정제</button>
      <button onclick="useItem('엘리베이터')">엘리베이터</button>
      <button onclick="useItem('친구따라강남')">친구따라강남</button>
    </div>
    <div class="debugGroup">
      <div class="debugLabel">친구따라강남 테스트</div>
      <input type="number" id="debugFriendHeight" min="0" step="0.5" placeholder="목표 높이(m)" />
      <button onclick="debugFriendFollow()">이동</button>
      <button onclick="useItem('꽝_고급')">꽝(고급)</button>
      <button onclick="useItem('자율주행')">자율주행</button>
    </div>
    <div class="debugGroup">
      <div class="debugLabel">일반 아이템</div>
      <button onclick="useItem('사다리')">사다리</button>
      <button onclick="useItem('당근')">당근</button>
      <button onclick="useItem('꽝')">꽝</button>
      <button onclick="useItem('폭죽')">폭죽</button>
    </div>
    <div class="debugGroup">
      <div class="debugLabel">저주 (전체 흐름)</div>
      <button onclick="useItem('거울의 저주')">거울의 저주</button>
      <button onclick="useItem('암흑의 저주')">암흑의 저주</button>
    </div>
    <div class="debugGroup">
      <div class="debugLabel">저주 (즉시 효과만)</div>
      <button onclick="activateCurseEffect('거울의 저주')">거울 즉시</button>
      <button onclick="activateCurseEffect('암흑의 저주')">암흑 즉시</button>
    </div>
  </div>

  <!-- 관리자 패널 (F2 또는 버튼으로 토글) -->
  <button id="adminToggle" title="관리자 패널 (F2)">관리자</button>
  <div id="adminPanel" class="hidden">
    <div class="adminTitle">관리자 패널</div>

    <div class="adminGroup">
      <div class="adminLabel">시작 높이 (m)</div>
      <input type="number" id="adminStartHeight" min="0" step="0.5" value="0" placeholder="0" />
      <button onclick="adminGotoHeight()">이동 + 설정</button>
    </div>

    <div class="adminGroup">
      <label class="adminCheckLabel">
        <input type="checkbox" id="adminTestMode" onchange="adminToggleTestMode()" />
        테스트 모드 (채찍·퀴즈 비활성)
      </label>
    </div>

    <div class="adminGroup">
      <div class="adminLabel">아이템 강제 적용</div>
      <select id="adminItemSelect"></select>
      <button onclick="adminForceItem()">적용</button>
    </div>

    <div class="adminGroup">
      <div class="adminLabel">더미 플레이어 <span id="adminDummyStatus">0명</span></div>
      <input type="number" id="adminDummyCount" min="1" max="30" value="5" />
      <button onclick="adminAddDummies()">추가</button>
      <button onclick="adminClearDummies()">전체 삭제</button>
    </div>
  </div>

  <!-- 문제 업로드 버튼 -->
  <div id="uploadArea">
    <label id="uploadBtn" for="xlsxInput">문제 업로드</label>
    <input type="file" id="xlsxInput" accept=".xlsx,.xls" />
    <span id="uploadStatus">문제 없음</span>
  </div>

  <!-- 저주 확인 오버레이 -->
  <div id="curseConfirmOverlay" class="hidden">
    <div id="curseConfirmPanel">
      <div id="curseConfirmTitle">⚠ 저주를 거시겠습니까?</div>
      <div id="curseConfirmName">거울의 저주</div>
      <div id="curseConfirmTimer">5</div>
      <div id="curseConfirmBtns">
        <button id="curseConfirmYes">예 — 저주!</button>
        <button id="curseConfirmNo">아니요</button>
      </div>
    </div>
  </div>

  <!-- 친구따라강남 오버레이 (6단계에서 플레이어 선택 UI로 교체 예정) -->
  <div id="friendFollowOverlay" class="hidden">
    <div id="friendFollowPanel">
      <div id="friendFollowTitle">친구따라강남</div>
      <p id="friendFollowSub">목표 높이(m)를 입력하세요</p>
      <input type="number" id="friendFollowInput" min="0" step="0.5" />
      <div id="friendFollowBtns">
        <button id="friendFollowConfirm">예 — 이동!</button>
        <button id="friendFollowCancel">아니오</button>
      </div>
    </div>
  </div>

  <!-- 퀴즈 오버레이 -->
  <div id="quizOverlay" class="hidden">
    <div id="quizPanel">
      <div id="quizMeta">
        <span id="quizProgress">문제 1 / 3</span>
        <span id="quizType"></span>
      </div>
      <div id="quizContent"></div>
      <div id="quizImageWrap" class="hidden">
        <img id="quizImg" alt="문제 이미지" />
      </div>
      <div id="quizAnswerArea"></div>
      <button id="quizSubmit">제출</button>
      <div id="quizFeedback"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
