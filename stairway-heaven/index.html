<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>천국의 계단</title>
  <link rel="stylesheet" href="style.css">
  <!-- SheetJS: 엑셀(.xlsx) 파싱 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- 문제 업로드 버튼 -->
  <div id="uploadArea">
    <label id="uploadBtn" for="xlsxInput">문제 업로드</label>
    <input type="file" id="xlsxInput" accept=".xlsx,.xls" />
    <span id="uploadStatus">문제 없음</span>
  </div>

  <!-- 퀴즈 오버레이 -->
  <div id="quizOverlay" class="hidden">
    <div id="quizPanel">
      <div id="quizMeta">
        <span id="quizProgress">문제 1 / 3</span>
        <span id="quizType"></span>
      </div>
      <div id="quizContent"></div>
      <div id="quizImageWrap" class="hidden">
        <img id="quizImg" alt="문제 이미지" />
      </div>
      <div id="quizAnswerArea"></div>
      <button id="quizSubmit">제출</button>
      <div id="quizFeedback"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
